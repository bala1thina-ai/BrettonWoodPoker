<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BW Poker">
  <meta name="theme-color" content="#16213E">
  <title>BrettonWood Poker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1A1A2E; color: #fff; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; }
    input { font-family: inherit; }

    /* ─── Views ──────────────────────────────────────────────────── */
    .view { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
    .view.active { display: flex; }

    /* ─── Toolbar ────────────────────────────────────────────────── */
    .toolbar { background: #16213E; padding: 0 6px 0 4px; display: flex; align-items: center; min-height: 56px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.4); position: relative; z-index: 20; }
    .toolbar-title { flex: 1; font-size: 18px; font-weight: 700; color: #E2B96F; padding: 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-icon { background: none; border: none; color: #E2B96F; font-size: 22px; padding: 10px 10px; line-height: 1; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .btn-icon:active { background: rgba(226,185,111,.15); }

    /* ─── Sessions list ──────────────────────────────────────────── */
    .scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px 0 80px; }
    .session-card { background: #0F3460; border-radius: 10px; margin: 5px 10px; padding: 14px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .session-card:active { opacity: .8; }
    .session-info { flex: 1; min-width: 0; }
    .session-name { font-size: 16px; font-weight: 700; color: #fff; }
    .session-meta { font-size: 12px; color: #9E9E9E; margin-top: 3px; }
    .btn-del { background: none; border: 1.5px solid #E74C3C; border-radius: 6px; color: #E74C3C; padding: 6px 12px; font-size: 12px; flex-shrink: 0; }
    .btn-del:active { background: rgba(231,76,60,.15); }

    /* ─── Empty state ────────────────────────────────────────────── */
    .empty-state { text-align: center; color: #9E9E9E; padding: 60px 24px; font-size: 16px; line-height: 1.6; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ─── FAB ────────────────────────────────────────────────────── */
    .fab { position: absolute; bottom: 80px; right: 16px; width: 56px; height: 56px; border-radius: 50%; background: #E2B96F; border: none; color: #1A1A2E; font-size: 32px; line-height: 1; box-shadow: 0 4px 14px rgba(0,0,0,.4); z-index: 10; display: flex; align-items: center; justify-content: center; font-weight: 300; }
    .fab:active { background: #d4a85a; transform: scale(.96); }

    /* ─── Session view ───────────────────────────────────────────── */
    .total-pot-bar { background: #16213E; padding: 10px 16px; font-size: 15px; font-weight: 700; color: #E2B96F; flex-shrink: 0; border-bottom: 1px solid rgba(226,185,111,.2); }

    /* ─── Player list ────────────────────────────────────────────── */
    .player-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0 80px; }

    /* ─── Player card ────────────────────────────────────────────── */
    .player-card { background: #0F3460; border-radius: 8px; margin: 4px 8px; overflow: hidden; }
    .player-header { display: flex; align-items: center; padding: 12px 14px; min-height: 52px; cursor: pointer; gap: 8px; }
    .player-header:active { opacity: .8; }
    .player-name { flex: 1; font-size: 15px; font-weight: 700; color: #fff; word-break: break-word; }
    .player-badge { font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .chevron { color: #E2B96F; font-size: 11px; flex-shrink: 0; margin-left: 4px; }

    /* ─── Expanded section ───────────────────────────────────────── */
    .player-expanded { padding: 0 14px 12px; }
    .divider { height: 1px; background: rgba(226,185,111,.25); margin: 0 0 10px; }
    .details-row { display: flex; align-items: center; gap: 8px; }
    .breakdown { flex: 1; font-size: 12px; color: #9E9E9E; }
    .player-total { font-size: 15px; font-weight: 700; color: #E2B96F; flex-shrink: 0; }
    .btn-round { width: 36px; height: 36px; border-radius: 50%; background: none; border: 1.5px solid #E2B96F; color: #E2B96F; font-size: 20px; line-height: 1; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-round:active { background: rgba(226,185,111,.15); }
    .net-label { font-size: 13px; font-weight: 700; margin: 6px 0 0; }
    .actions-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn-outlined { flex: 1; background: none; border: 1.5px solid; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-weight: 600; }
    .btn-outlined.green { border-color: #2ECC71; color: #2ECC71; }
    .btn-outlined.green:active { background: rgba(46,204,113,.15); }
    .btn-outlined.red { border-color: #E74C3C; color: #E74C3C; }
    .btn-outlined.red:active { background: rgba(231,76,60,.15); }

    /* ─── Summary bar ────────────────────────────────────────────── */
    .summary-bar { background: #16213E; display: flex; gap: 32px; padding: 12px 16px; flex-shrink: 0; border-top: 1px solid rgba(226,185,111,.25); }
    .stat-label { font-size: 10px; color: #9E9E9E; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-value.gold { color: #E2B96F; }
    .stat-value.white { color: #fff; }

    /* ─── Dropdown menu ──────────────────────────────────────────── */
    .menu-popup { position: absolute; top: 52px; right: 4px; background: #243B6A; border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,.5); z-index: 30; display: none; min-width: 170px; overflow: hidden; }
    .menu-popup.open { display: block; }
    .menu-item { padding: 14px 18px; font-size: 15px; color: #fff; cursor: pointer; }
    .menu-item:active { background: rgba(255,255,255,.1); }

    /* ─── Overlay ────────────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 40; display: none; }
    .overlay.active { display: block; }
    .overlay.clear { background: transparent; }

    /* ─── Dialog ─────────────────────────────────────────────────── */
    .dialog { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #16213E; border-radius: 14px; padding: 22px 20px 16px; width: calc(100% - 40px); max-width: 360px; z-index: 50; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
    .dialog.active { display: block; }
    .dialog-title { font-size: 18px; font-weight: 700; color: #E2B96F; margin-bottom: 14px; }
    .dialog-info { font-size: 14px; color: #9E9E9E; margin-bottom: 10px; }
    .dialog input { width: 100%; background: #0F3460; border: 1.5px solid rgba(226,185,111,.5); border-radius: 8px; padding: 11px 12px; color: #fff; font-size: 16px; margin-bottom: 10px; outline: none; appearance: none; -webkit-appearance: none; }
    .dialog input:focus { border-color: #E2B96F; }
    .dialog input::placeholder { color: #666; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 4px; margin-top: 8px; }
    .btn-dialog { background: none; border: none; padding: 10px 16px; font-size: 15px; border-radius: 8px; }
    .btn-dialog.cancel { color: #9E9E9E; }
    .btn-dialog.cancel:active { background: rgba(255,255,255,.08); }
    .btn-dialog.confirm { color: #E2B96F; font-weight: 700; }
    .btn-dialog.confirm:active { background: rgba(226,185,111,.12); }
  </style>
</head>
<body>

<!-- ══════════════════ SESSIONS VIEW ══════════════════ -->
<div id="view-sessions" class="view active">
  <div class="toolbar">
    <span class="toolbar-title">BrettonWood Poker</span>
  </div>
  <div id="sessions-list" class="scrollable"></div>
  <div id="sessions-empty" class="empty-state" style="display:none">
    No sessions yet.<br>Tap <strong style="color:#E2B96F">+</strong> to start a game.
  </div>
  <button class="fab" onclick="showNewSessionDialog()" aria-label="New session">+</button>
</div>

<!-- ══════════════════ SESSION VIEW ═══════════════════ -->
<div id="view-session" class="view">
  <div class="toolbar">
    <button class="btn-icon" onclick="showSessionsView()" aria-label="Back">&#8592;</button>
    <span id="session-title" class="toolbar-title"></span>
    <button class="btn-icon" id="menu-btn" onclick="toggleMenu()" aria-label="Menu">&#8942;</button>
    <div id="session-menu" class="menu-popup">
      <div class="menu-item" onclick="showRenameDialog()">Rename Session</div>
    </div>
  </div>
  <div id="total-pot" class="total-pot-bar">Total Pot: $0.00</div>
  <div id="players-list" class="player-list"></div>
  <div id="players-empty" class="empty-state" style="display:none">
    No players yet.<br>Tap <strong style="color:#E2B96F">+</strong> to add a player.
  </div>
  <div class="summary-bar">
    <div>
      <div class="stat-label">Buy-Ins</div>
      <div id="stat-buyins" class="stat-value gold">$0.00</div>
    </div>
    <div>
      <div class="stat-label">Settled</div>
      <div id="stat-settled" class="stat-value white">$0.00</div>
    </div>
  </div>
  <button class="fab" onclick="showAddPlayerDialog()" aria-label="Add player">+</button>
</div>

<!-- ══════════════════ OVERLAY + DIALOG ═══════════════ -->
<div id="overlay" class="overlay" onclick="handleOverlayClick()"></div>
<div id="dialog" class="dialog" role="dialog" aria-modal="true"></div>

<script>
'use strict';

// ── State ───────────────────────────────────────────────────────────
let db = { sessions: [] };
let currentSessionId = null;
let expandedIds = new Set();
const STORAGE_KEY = 'bw-poker-v1';

// ── Persistence ─────────────────────────────────────────────────────
function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) db = JSON.parse(s); } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch {}
}

// ── Utilities ───────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmt(n) { return '$' + Math.abs(n).toFixed(2); }

function ordinal(n) {
  if (n >= 11 && n <= 13) return n + 'th';
  switch (n % 10) { case 1: return n + 'st'; case 2: return n + 'nd'; case 3: return n + 'rd'; default: return n + 'th'; }
}

function defaultName() {
  const d = new Date();
  const month = d.toLocaleString('en-US', { month: 'long' });
  return `${month} ${ordinal(d.getDate())} Game`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

// ── Player stats ────────────────────────────────────────────────────
function stats(player) {
  const buyins = player.buyins || [];
  const active = buyins.filter(b => b.type !== 'CASHOUT');
  const cashouts = buyins.filter(b => b.type === 'CASHOUT');
  const totalAmount = active.reduce((s, b) => s + b.amount, 0);
  const buyInCount = buyins.filter(b => b.type === 'BUYIN').length;
  const rebuyCount = buyins.filter(b => b.type === 'REBUY').length;
  const cashoutAmount = cashouts.reduce((s, b) => s + b.amount, 0);
  const hasCashedOut = cashoutAmount > 0;
  const net = cashoutAmount - totalAmount;
  return { totalAmount, buyInCount, rebuyCount, cashoutAmount, hasCashedOut, net };
}

// ── Sort players ────────────────────────────────────────────────────
function sortedPlayers(players) {
  return [...(players || [])].sort((a, b) => {
    const sa = stats(a), sb = stats(b);
    if (sa.hasCashedOut !== sb.hasCashedOut) return sa.hasCashedOut ? -1 : 1;
    if (sa.hasCashedOut) return sb.net - sa.net;
    return sb.totalAmount - sa.totalAmount;
  });
}

// ── View navigation ─────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

function showSessionsView() {
  currentSessionId = null;
  expandedIds.clear();
  renderSessions();
  showView('sessions');
}

function openSession(id) {
  currentSessionId = id;
  expandedIds.clear();
  renderSession();
  showView('session');
}

// ── Render sessions list ────────────────────────────────────────────
function renderSessions() {
  const list = document.getElementById('sessions-list');
  const empty = document.getElementById('sessions-empty');
  if (!db.sessions.length) {
    list.innerHTML = '';
    list.style.display = 'none';
    empty.style.display = '';
    return;
  }
  list.style.display = '';
  empty.style.display = 'none';
  list.innerHTML = db.sessions.map(s => `
    <div class="session-card" onclick="openSession('${s.id}')">
      <div class="session-info">
        <div class="session-name">${esc(s.name)}</div>
        <div class="session-meta">${fmtDate(s.date)}</div>
      </div>
      <button class="btn-del" onclick="event.stopPropagation(); confirmDeleteSession('${s.id}')">Delete</button>
    </div>
  `).join('');
}

// ── Render session detail ───────────────────────────────────────────
function renderSession() {
  const session = db.sessions.find(s => s.id === currentSessionId);
  if (!session) return;
  document.getElementById('session-title').textContent = session.name;
  renderPlayers();
}

function renderPlayers() {
  const session = db.sessions.find(s => s.id === currentSessionId);
  if (!session) return;

  const sorted = sortedPlayers(session.players);
  const list = document.getElementById('players-list');
  const empty = document.getElementById('players-empty');

  // Footer stats
  const totalIn = sorted.reduce((s, p) => s + stats(p).totalAmount, 0);
  const totalSettled = sorted.reduce((s, p) => s + stats(p).cashoutAmount, 0);
  document.getElementById('total-pot').textContent = 'Total Pot: $' + totalIn.toFixed(2);
  document.getElementById('stat-buyins').textContent = '$' + totalIn.toFixed(2);
  document.getElementById('stat-settled').textContent = '$' + totalSettled.toFixed(2);

  if (!sorted.length) {
    list.innerHTML = '';
    list.style.display = 'none';
    empty.style.display = '';
    return;
  }
  list.style.display = '';
  empty.style.display = 'none';
  list.innerHTML = sorted.map(p => playerCardHtml(p)).join('');
}

function playerCardHtml(player) {
  const s = stats(player);
  const expanded = expandedIds.has(player.id);

  // Badge (collapsed info)
  let badgeHtml;
  if (s.hasCashedOut) {
    const color = s.net >= 0 ? '#2ECC71' : '#E74C3C';
    const text = (s.net >= 0 ? '+' : '-') + fmt(s.net);
    badgeHtml = `<span class="player-badge" style="color:${color}">${text}</span>`;
  } else {
    badgeHtml = `<span class="player-badge" style="color:#E2B96F">${fmt(s.totalAmount)}</span>`;
  }

  let expandedHtml = '';
  if (expanded) {
    let breakdown = `${s.buyInCount} buy-in${s.buyInCount !== 1 ? 's' : ''}`;
    if (s.rebuyCount > 0) breakdown += ` + ${s.rebuyCount} rebuy${s.rebuyCount !== 1 ? 's' : ''}`;

    let netHtml = '';
    if (s.hasCashedOut) {
      const c = s.net >= 0 ? '#2ECC71' : '#E74C3C';
      const t = (s.net >= 0 ? 'Net: +' : 'Net: -') + fmt(s.net);
      netHtml = `<div class="net-label" style="color:${c}">${t}</div>`;
    }

    expandedHtml = `
      <div class="player-expanded">
        <div class="divider"></div>
        <div class="details-row">
          <span class="breakdown">${breakdown}</span>
          <span class="player-total">${fmt(s.totalAmount)}</span>
          <button class="btn-round" onclick="undoRebuy('${player.id}')" title="Remove last $30 rebuy">&#8722;</button>
          <button class="btn-round" onclick="quickRebuy('${player.id}')" title="Add $30 rebuy">+</button>
        </div>
        ${netHtml}
        <div class="actions-row">
          <button class="btn-outlined green" onclick="showCashOutDialog('${player.id}')">Cash Out</button>
          <button class="btn-outlined red" onclick="confirmRemove('${player.id}')">Remove</button>
        </div>
      </div>`;
  }

  return `
    <div class="player-card" id="pc-${player.id}">
      <div class="player-header" onclick="toggleExpand('${player.id}')">
        <span class="player-name">${esc(player.name)}</span>
        ${badgeHtml}
        <span class="chevron">${expanded ? '▲' : '▼'}</span>
      </div>
      ${expandedHtml}
    </div>`;
}

function toggleExpand(id) {
  if (expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id);
  renderPlayers();
}

// ── Session operations ──────────────────────────────────────────────
function createSession(name) {
  const s = { id: uid(), name, date: Date.now(), players: [] };
  db.sessions.unshift(s);
  save();
  openSession(s.id);
}

function confirmDeleteSession(id) {
  const s = db.sessions.find(s => s.id === id);
  if (!s) return;
  if (!confirm(`Delete "${s.name}"? This cannot be undone.`)) return;
  db.sessions = db.sessions.filter(s => s.id !== id);
  save();
  renderSessions();
}

function renameSession(name) {
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (s) { s.name = name; save(); renderSession(); }
}

// ── Player operations ───────────────────────────────────────────────
function addPlayer(name, amount) {
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (!s) return;
  s.players.push({ id: uid(), name, buyins: [{ id: uid(), type: 'BUYIN', amount, timestamp: Date.now() }] });
  save();
  renderPlayers();
}

function quickRebuy(pid) {
  const player = findPlayer(pid);
  if (!player) return;
  player.buyins.push({ id: uid(), type: 'REBUY', amount: 30, timestamp: Date.now() });
  save();
  renderPlayers();
}

function undoRebuy(pid) {
  const player = findPlayer(pid);
  if (!player) return;
  const idx = [...player.buyins].reverse().findIndex(b => b.type === 'REBUY');
  if (idx === -1) return;
  player.buyins.splice(player.buyins.length - 1 - idx, 1);
  save();
  renderPlayers();
}

function cashOut(pid, amount) {
  const player = findPlayer(pid);
  if (!player) return;
  player.buyins = player.buyins.filter(b => b.type !== 'CASHOUT');
  player.buyins.push({ id: uid(), type: 'CASHOUT', amount, timestamp: Date.now() });
  save();
  renderPlayers();
}

function confirmRemove(pid) {
  const player = findPlayer(pid);
  if (!player) return;
  if (!confirm(`Remove ${player.name} from this session?`)) return;
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (s) { s.players = s.players.filter(p => p.id !== pid); expandedIds.delete(pid); save(); renderPlayers(); }
}

function findPlayer(pid) {
  const s = db.sessions.find(s => s.id === currentSessionId);
  return s?.players.find(p => p.id === pid);
}

// ── Dialogs ─────────────────────────────────────────────────────────
function openDialog(html) {
  const dlg = document.getElementById('dialog');
  const ov = document.getElementById('overlay');
  dlg.innerHTML = html;
  dlg.classList.add('active');
  ov.classList.remove('clear');
  ov.classList.add('active');
  // Focus first input
  setTimeout(() => { const inp = dlg.querySelector('input'); if (inp) { inp.focus(); inp.select && inp.select(); } }, 60);
}

function closeDialog() {
  document.getElementById('dialog').classList.remove('active');
  document.getElementById('overlay').classList.remove('active', 'clear');
}

function handleOverlayClick() {
  const menuOpen = document.getElementById('session-menu').classList.contains('open');
  if (menuOpen) { closeMenu(); return; }
  closeDialog();
}

function showNewSessionDialog() {
  openDialog(`
    <div class="dialog-title">New Session</div>
    <input type="text" id="inp-sname" value="${esc(defaultName())}" placeholder="Session name" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitNewSession()">Create</button>
    </div>
  `);
}

function submitNewSession() {
  const v = document.getElementById('inp-sname')?.value.trim();
  if (v) { closeDialog(); createSession(v); }
}

function showAddPlayerDialog() {
  openDialog(`
    <div class="dialog-title">Add Player</div>
    <input type="text" id="inp-pname" placeholder="Player name" autocomplete="off" />
    <input type="number" id="inp-buyin" value="30" placeholder="Buy-in ($)" inputmode="decimal" min="0" step="0.01" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitAddPlayer()">Add</button>
    </div>
  `);
}

function submitAddPlayer() {
  const name = document.getElementById('inp-pname')?.value.trim();
  const amount = parseFloat(document.getElementById('inp-buyin')?.value) || 0;
  if (name) { closeDialog(); addPlayer(name, amount); }
}

function showCashOutDialog(pid) {
  const player = findPlayer(pid);
  if (!player) return;
  const s = stats(player);
  openDialog(`
    <div class="dialog-title">Cash Out</div>
    <div class="dialog-info">${esc(player.name)} · Total in: ${fmt(s.totalAmount)}</div>
    <input type="number" id="inp-cashout" placeholder="Chips returned ($)" inputmode="decimal" min="0" step="0.01" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitCashOut('${pid}')">Settle</button>
    </div>
  `);
}

function submitCashOut(pid) {
  const amount = parseFloat(document.getElementById('inp-cashout')?.value) || 0;
  closeDialog();
  cashOut(pid, amount);
}

function showRenameDialog() {
  closeMenu();
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (!s) return;
  openDialog(`
    <div class="dialog-title">Rename Session</div>
    <input type="text" id="inp-rename" value="${esc(s.name)}" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitRename()">Rename</button>
    </div>
  `);
}

function submitRename() {
  const v = document.getElementById('inp-rename')?.value.trim();
  if (v) { closeDialog(); renameSession(v); }
}

// ── Menu ─────────────────────────────────────────────────────────────
function toggleMenu() {
  const menu = document.getElementById('session-menu');
  const ov = document.getElementById('overlay');
  if (menu.classList.contains('open')) {
    closeMenu();
  } else {
    menu.classList.add('open');
    ov.classList.add('active', 'clear');
  }
}
function closeMenu() {
  document.getElementById('session-menu').classList.remove('open');
  document.getElementById('overlay').classList.remove('active', 'clear');
}

// ── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const btn = document.querySelector('#dialog .btn-dialog.confirm');
    if (btn) btn.click();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('session-menu').classList.contains('open')) { closeMenu(); return; }
    if (document.getElementById('dialog').classList.contains('active')) closeDialog();
  }
});

// ── PWA service worker ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ── Boot ─────────────────────────────────────────────────────────────
load();
renderSessions();
</script>
</body>
</html>
