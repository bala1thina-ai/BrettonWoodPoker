<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BW Poker">
  <meta name="theme-color" content="#071A34">
  <title>BrettonWood Poker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Keyframes ────────────────────────────────────────────────── */
    @keyframes poolWave {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes goldShimmer {
      0%   { background-position: -300% center; }
      100% { background-position: 300% center; }
    }
    @keyframes fabGlow {
      0%, 100% { box-shadow: 0 0 18px 4px rgba(255,215,0,.55), 0 4px 20px rgba(0,0,0,.5); }
      50%       { box-shadow: 0 0 36px 10px rgba(255,215,0,.85), 0 4px 20px rgba(0,0,0,.5); }
    }
    @keyframes fabRipple {
      0%   { opacity: .7; transform: scale(1); }
      100% { opacity: 0;  transform: scale(1.7); }
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0)   rotate(-3deg); }
      50%       { transform: translateY(-8px) rotate(3deg);  }
    }
    @keyframes floatCardR {
      0%, 100% { transform: translateY(0)   rotate(3deg);  }
      50%       { transform: translateY(-8px) rotate(-3deg); }
    }
    @keyframes waterRipple {
      0%   { background-position: 0% 0%;   }
      100% { background-position: 100% 100%; }
    }
    @keyframes suitFloat {
      0%, 100% { transform: translateY(0)  rotate(0deg);   opacity: .06; }
      50%       { transform: translateY(-20px) rotate(15deg); opacity: .12; }
    }

    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overscroll-behavior: none; }
    button { font-family: inherit; cursor: pointer; }
    input  { font-family: inherit; }

    /* ── Pool background ─────────────────────────────────────────── */
    body {
      color: #fff;
      background: linear-gradient(135deg, #051020 0%, #082040 20%, #0A2E60 45%, #0C3878 60%, #082040 80%, #051020 100%);
      background-size: 400% 400%;
      animation: poolWave 12s ease infinite;
      position: relative;
      overflow: hidden;
    }

    /* Pool tile grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,210,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,210,255,.06) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      z-index: 0;
    }

    /* Water caustics shimmer */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 25% 35%, rgba(0,180,255,.12) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 65%, rgba(0,220,255,.09) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 80%, rgba(0,150,220,.07) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
      animation: waterRipple 8s linear infinite alternate;
    }

    /* Floating suit watermarks */
    .bg-suits {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-suit {
      position: absolute;
      font-size: 80px;
      color: rgba(255,215,0,1);
      animation: suitFloat 7s ease-in-out infinite;
    }
    .bg-suit:nth-child(1) { top: 5%;  left: 5%;  font-size: 60px;  animation-delay: 0s;   animation-duration: 8s;  }
    .bg-suit:nth-child(2) { top: 15%; right: 6%; font-size: 90px;  animation-delay: 2s;   animation-duration: 10s; }
    .bg-suit:nth-child(3) { top: 45%; left: 2%;  font-size: 55px;  animation-delay: 1s;   animation-duration: 7s;  }
    .bg-suit:nth-child(4) { top: 60%; right: 3%; font-size: 70px;  animation-delay: 3s;   animation-duration: 9s;  }
    .bg-suit:nth-child(5) { top: 80%; left: 8%;  font-size: 50px;  animation-delay: 4s;   animation-duration: 11s; }
    .bg-suit:nth-child(6) { top: 75%; right: 9%; font-size: 65px;  animation-delay: 1.5s; animation-duration: 8s;  }

    /* ── Views ───────────────────────────────────────────────────── */
    .view { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; position: relative; z-index: 1; }
    .view.active { display: flex; }

    /* ── Gold shimmer text ───────────────────────────────────────── */
    .gold-text {
      background: linear-gradient(90deg, #7D5A00, #B8860B, #FFD700, #FFF8DC, #FFD700, #B8860B, #7D5A00);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 4s linear infinite;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      background: linear-gradient(135deg, rgba(4,12,28,.97) 0%, rgba(8,30,65,.97) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,215,0,.35);
      padding: 0 8px;
      display: flex;
      align-items: center;
      min-height: 62px;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
      box-shadow: 0 2px 24px rgba(255,215,0,.12), 0 4px 16px rgba(0,0,0,.6);
      gap: 6px;
    }

    .toolbar-title {
      flex: 1;
      font-size: 17px;
      font-weight: 900;
      padding: 0 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: .5px;
    }

    .btn-icon {
      background: none; border: none;
      color: #FFD700;
      font-size: 22px;
      padding: 10px;
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .btn-icon:active { background: rgba(255,215,0,.15); }

    /* ── Ace playing cards ───────────────────────────────────────── */
    .ace-card {
      width: 34px; height: 46px;
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      border-radius: 5px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      line-height: 1.1;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(0,0,0,.5), 0 0 8px rgba(255,215,0,.3);
    }
    .ace-card.spades { color: #111; animation: floatCard  3s ease-in-out infinite; }
    .ace-card.hearts { color: #CC0000; animation: floatCardR 3s ease-in-out infinite; animation-delay: 1s; }
    .ace-lbl  { font-size: 12px; font-weight: 900; }
    .ace-suit { font-size: 18px; }

    /* ── Session list ────────────────────────────────────────────── */
    .scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 0 95px; }

    .session-card {
      background: linear-gradient(135deg, rgba(6,20,50,.88) 0%, rgba(10,44,100,.88) 100%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,.22);
      border-radius: 14px;
      margin: 6px 10px;
      padding: 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .session-card:active { border-color: rgba(255,215,0,.6); opacity: .85; }

    .session-info { flex: 1; min-width: 0; }
    .session-name { font-size: 16px; font-weight: 700; color: #fff; }
    .session-meta { font-size: 12px; color: rgba(0,210,255,.8); margin-top: 3px; }

    .btn-del {
      background: none; border: 1.5px solid #E74C3C;
      border-radius: 8px; color: #E74C3C;
      padding: 6px 12px; font-size: 12px; flex-shrink: 0;
    }
    .btn-del:active { background: rgba(231,76,60,.15); }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      text-align: center; color: rgba(0,210,255,.65);
      padding: 60px 24px; font-size: 16px; line-height: 1.7;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .empty-ace { font-size: 64px; margin-bottom: 16px; opacity: .4; }

    /* ── FAB ─────────────────────────────────────────────────────── */
    .fab {
      position: absolute; bottom: 86px; right: 16px;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #9A6E00, #FFD700, #FFC200, #FFD700);
      border: none; color: #071628;
      font-size: 34px; line-height: 1; font-weight: 300;
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
      animation: fabGlow 2s ease-in-out infinite;
    }
    .fab:active { transform: scale(.94); }
    .fab::before {
      content: '';
      position: absolute; inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(255,215,0,.55);
      animation: fabRipple 2s ease-out infinite;
    }

    /* ── Total pot ───────────────────────────────────────────────── */
    .total-pot-bar {
      background: linear-gradient(90deg, rgba(4,12,28,.9) 0%, rgba(0,80,160,.3) 50%, rgba(4,12,28,.9) 100%);
      padding: 10px 16px;
      font-size: 15px; font-weight: 800;
      color: #00DFFF;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(0,210,255,.18);
      text-shadow: 0 0 14px rgba(0,210,255,.6);
      letter-spacing: .4px;
    }

    /* ── Player list ─────────────────────────────────────────────── */
    .player-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0 95px; }

    /* ── Player card ─────────────────────────────────────────────── */
    .player-card {
      background: linear-gradient(135deg, rgba(4,14,40,.92) 0%, rgba(8,34,80,.92) 100%);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,215,0,.18);
      border-radius: 12px;
      margin: 5px 8px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.03);
    }

    .player-header {
      display: flex; align-items: center;
      padding: 13px 14px; min-height: 56px;
      cursor: pointer; gap: 8px;
    }
    .player-header:active { background: rgba(255,215,0,.05); }

    .player-name  { flex: 1; font-size: 15px; font-weight: 700; color: #fff; word-break: break-word; }
    .player-badge { font-size: 14px; font-weight: 800; flex-shrink: 0; }
    .chevron      { color: #FFD700; font-size: 11px; flex-shrink: 0; margin-left: 4px; }

    /* ── Expanded ────────────────────────────────────────────────── */
    .player-expanded { padding: 0 14px 13px; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,215,0,.4), transparent); margin: 0 0 10px; }
    .details-row { display: flex; align-items: center; gap: 8px; }
    .breakdown    { flex: 1; font-size: 12px; color: rgba(0,210,255,.8); }
    .player-total { font-size: 15px; font-weight: 800; color: #FFD700; flex-shrink: 0; text-shadow: 0 0 10px rgba(255,215,0,.4); }

    .btn-round {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(160,110,0,.2), rgba(255,215,0,.1));
      border: 1.5px solid #FFD700; color: #FFD700;
      font-size: 22px; line-height: 1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(255,215,0,.2);
    }
    .btn-round:active { background: rgba(255,215,0,.2); }

    .net-label   { font-size: 13px; font-weight: 800; margin: 6px 0 0; }
    .actions-row { display: flex; gap: 10px; margin-top: 10px; }

    .btn-outlined { flex: 1; background: none; border: 1.5px solid; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-weight: 700; }
    .btn-outlined.green { border-color: #2ECC71; color: #2ECC71; box-shadow: 0 0 10px rgba(46,204,113,.15); }
    .btn-outlined.green:active { background: rgba(46,204,113,.15); }
    .btn-outlined.red   { border-color: #E74C3C; color: #E74C3C; }
    .btn-outlined.red:active   { background: rgba(231,76,60,.15); }

    /* ── Summary bar ─────────────────────────────────────────────── */
    .summary-bar {
      background: linear-gradient(90deg, rgba(4,12,28,.97) 0%, rgba(0,60,130,.45) 50%, rgba(4,12,28,.97) 100%);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; gap: 32px;
      padding: 13px 16px;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,215,0,.3);
      box-shadow: 0 -2px 24px rgba(255,215,0,.08);
    }
    .stat-label { font-size: 10px; color: rgba(0,210,255,.7); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
    .stat-value { font-size: 22px; font-weight: 800; }
    .stat-value.white { color: #fff; }

    /* ── Dropdown menu ───────────────────────────────────────────── */
    .menu-popup {
      position: absolute; top: 60px; right: 4px;
      background: linear-gradient(135deg, #06101E, #0A2440);
      border: 1px solid rgba(255,215,0,.35);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 24px rgba(255,215,0,.08);
      z-index: 30; display: none; min-width: 170px; overflow: hidden;
    }
    .menu-popup.open { display: block; }
    .menu-item { padding: 14px 18px; font-size: 15px; color: #fff; cursor: pointer; }
    .menu-item:active { background: rgba(255,215,0,.1); }

    /* ── Overlay ─────────────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 40; display: none; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
    .overlay.active { display: block; }
    .overlay.clear  { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; }

    /* ── Dialog ──────────────────────────────────────────────────── */
    .dialog {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #06101E 0%, #0A2440 100%);
      border: 1px solid rgba(255,215,0,.45);
      border-radius: 18px;
      padding: 22px 20px 16px;
      width: calc(100% - 40px); max-width: 360px;
      z-index: 50; display: none;
      box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 40px rgba(255,215,0,.1);
    }
    .dialog.active { display: block; }
    .dialog-title { font-size: 18px; font-weight: 900; margin-bottom: 14px; }
    .dialog-info  { font-size: 14px; color: rgba(0,210,255,.8); margin-bottom: 10px; }
    .dialog input {
      width: 100%;
      background: rgba(0,0,0,.35);
      border: 1.5px solid rgba(255,215,0,.4);
      border-radius: 10px;
      padding: 11px 12px; color: #fff; font-size: 16px; margin-bottom: 10px;
      outline: none; appearance: none; -webkit-appearance: none;
    }
    .dialog input:focus { border-color: #FFD700; box-shadow: 0 0 12px rgba(255,215,0,.2); }
    .dialog input::placeholder { color: rgba(255,255,255,.3); }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 4px; margin-top: 8px; }
    .btn-dialog { background: none; border: none; padding: 10px 16px; font-size: 15px; border-radius: 8px; }
    .btn-dialog.cancel  { color: rgba(255,255,255,.4); }
    .btn-dialog.cancel:active  { background: rgba(255,255,255,.08); }
    .btn-dialog.confirm { color: #FFD700; font-weight: 800; }
    .btn-dialog.confirm:active { background: rgba(255,215,0,.12); }
  </style>
</head>
<body>

<!-- Floating background suit watermarks -->
<div class="bg-suits" aria-hidden="true">
  <span class="bg-suit">♠</span>
  <span class="bg-suit">♥</span>
  <span class="bg-suit">♦</span>
  <span class="bg-suit">♣</span>
  <span class="bg-suit">♠</span>
  <span class="bg-suit">♥</span>
</div>

<!-- ══════════════════ SESSIONS VIEW ══════════════════ -->
<div id="view-sessions" class="view active">
  <div class="toolbar">
    <div class="ace-card spades"><span class="ace-lbl">A</span><span class="ace-suit">♠</span></div>
    <span class="toolbar-title gold-text">BrettonWood Poker</span>
    <div class="ace-card hearts"><span class="ace-lbl">A</span><span class="ace-suit">♥</span></div>
  </div>
  <div id="sessions-list" class="scrollable"></div>
  <div id="sessions-empty" class="empty-state" style="display:none">
    <div class="empty-ace">♠ A ♥</div>
    No sessions yet.<br>Tap <strong style="color:#FFD700">+</strong> to start a game.
  </div>
  <button class="fab" onclick="showNewSessionDialog()" aria-label="New session">+</button>
</div>

<!-- ══════════════════ SESSION VIEW ═══════════════════ -->
<div id="view-session" class="view">
  <div class="toolbar">
    <button class="btn-icon" onclick="showSessionsView()" aria-label="Back">&#8592;</button>
    <span id="session-title" class="toolbar-title gold-text"></span>
    <button class="btn-icon" id="menu-btn" onclick="toggleMenu()" aria-label="Menu">&#8942;</button>
    <div id="session-menu" class="menu-popup">
      <div class="menu-item" onclick="showRenameDialog()">✏️ Rename Session</div>
    </div>
  </div>
  <div id="total-pot" class="total-pot-bar">Total Pot: $0.00</div>
  <div id="players-list" class="player-list"></div>
  <div id="players-empty" class="empty-state" style="display:none">
    <div class="empty-ace">🃏</div>
    No players yet.<br>Tap <strong style="color:#FFD700">+</strong> to add a player.
  </div>
  <div class="summary-bar">
    <div>
      <div class="stat-label">💰 Buy-Ins</div>
      <div id="stat-buyins" class="stat-value gold-text">$0.00</div>
    </div>
    <div>
      <div class="stat-label">✅ Settled</div>
      <div id="stat-settled" class="stat-value white">$0.00</div>
    </div>
  </div>
  <button class="fab" onclick="showAddPlayerDialog()" aria-label="Add player">+</button>
</div>

<!-- ══════════════════ OVERLAY + DIALOG ═══════════════ -->
<div id="overlay" class="overlay" onclick="handleOverlayClick()"></div>
<div id="dialog" class="dialog" role="dialog" aria-modal="true"></div>

<script>
'use strict';

// ── State ───────────────────────────────────────────────────────────
let db = { sessions: [] };
let currentSessionId = null;
let expandedIds = new Set();
const STORAGE_KEY = 'bw-poker-v1';

// ── Persistence ─────────────────────────────────────────────────────
function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) db = JSON.parse(s); } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch {}
}

// ── Utilities ───────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmt(n) { return '$' + Math.abs(n).toFixed(2); }

function ordinal(n) {
  if (n >= 11 && n <= 13) return n + 'th';
  switch (n % 10) { case 1: return n+'st'; case 2: return n+'nd'; case 3: return n+'rd'; default: return n+'th'; }
}

function defaultName() {
  const d = new Date();
  return d.toLocaleString('en-US', { month: 'long' }) + ' ' + ordinal(d.getDate()) + ' Game';
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

// ── Player stats ────────────────────────────────────────────────────
function stats(player) {
  const buyins = player.buyins || [];
  const active  = buyins.filter(b => b.type !== 'CASHOUT');
  const cashouts = buyins.filter(b => b.type === 'CASHOUT');
  const totalAmount   = active.reduce((s, b) => s + b.amount, 0);
  const buyInCount    = buyins.filter(b => b.type === 'BUYIN').length;
  const rebuyCount    = buyins.filter(b => b.type === 'REBUY').length;
  const cashoutAmount = cashouts.reduce((s, b) => s + b.amount, 0);
  const hasCashedOut  = cashoutAmount > 0;
  const net           = cashoutAmount - totalAmount;
  return { totalAmount, buyInCount, rebuyCount, cashoutAmount, hasCashedOut, net };
}

// ── Sort players ────────────────────────────────────────────────────
function sortedPlayers(players) {
  return [...(players || [])].sort((a, b) => {
    const sa = stats(a), sb = stats(b);
    if (sa.hasCashedOut !== sb.hasCashedOut) return sa.hasCashedOut ? -1 : 1;
    if (sa.hasCashedOut) return sb.net - sa.net;
    return sb.totalAmount - sa.totalAmount;
  });
}

// ── View navigation ─────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

function showSessionsView() {
  currentSessionId = null; expandedIds.clear();
  renderSessions(); showView('sessions');
}

function openSession(id) {
  currentSessionId = id; expandedIds.clear();
  renderSession(); showView('session');
}

// ── Sessions list ────────────────────────────────────────────────────
function renderSessions() {
  const list  = document.getElementById('sessions-list');
  const empty = document.getElementById('sessions-empty');
  if (!db.sessions.length) {
    list.innerHTML = ''; list.style.display = 'none'; empty.style.display = ''; return;
  }
  list.style.display = ''; empty.style.display = 'none';
  list.innerHTML = db.sessions.map(s => `
    <div class="session-card" onclick="openSession('${s.id}')">
      <div class="session-info">
        <div class="session-name">${esc(s.name)}</div>
        <div class="session-meta">♠ ${fmtDate(s.date)}</div>
      </div>
      <button class="btn-del" onclick="event.stopPropagation(); confirmDeleteSession('${s.id}')">Delete</button>
    </div>
  `).join('');
}

// ── Session detail ───────────────────────────────────────────────────
function renderSession() {
  const session = db.sessions.find(s => s.id === currentSessionId);
  if (!session) return;
  document.getElementById('session-title').textContent = session.name;
  renderPlayers();
}

function renderPlayers() {
  const session = db.sessions.find(s => s.id === currentSessionId);
  if (!session) return;
  const sorted = sortedPlayers(session.players);
  const list   = document.getElementById('players-list');
  const empty  = document.getElementById('players-empty');

  const totalIn      = sorted.reduce((s, p) => s + stats(p).totalAmount, 0);
  const totalSettled = sorted.reduce((s, p) => s + stats(p).cashoutAmount, 0);
  document.getElementById('total-pot').textContent    = '💧 Total Pot: $' + totalIn.toFixed(2);
  document.getElementById('stat-buyins').textContent  = '$' + totalIn.toFixed(2);
  document.getElementById('stat-settled').textContent = '$' + totalSettled.toFixed(2);

  if (!sorted.length) { list.innerHTML = ''; list.style.display = 'none'; empty.style.display = ''; return; }
  list.style.display = ''; empty.style.display = 'none';
  list.innerHTML = sorted.map(p => playerCardHtml(p)).join('');
}

function playerCardHtml(player) {
  const s = stats(player);
  const expanded = expandedIds.has(player.id);

  let badgeHtml;
  if (s.hasCashedOut) {
    const color = s.net >= 0 ? '#2ECC71' : '#E74C3C';
    const icon  = s.net >= 0 ? '📈' : '📉';
    const text  = (s.net >= 0 ? '+' : '-') + fmt(s.net);
    badgeHtml = `<span class="player-badge" style="color:${color}">${icon} ${text}</span>`;
  } else {
    badgeHtml = `<span class="player-badge" style="color:#FFD700">💰 ${fmt(s.totalAmount)}</span>`;
  }

  let expandedHtml = '';
  if (expanded) {
    let breakdown = `${s.buyInCount} buy-in${s.buyInCount !== 1 ? 's' : ''}`;
    if (s.rebuyCount > 0) breakdown += ` + ${s.rebuyCount} rebuy${s.rebuyCount !== 1 ? 's' : ''}`;

    let netHtml = '';
    if (s.hasCashedOut) {
      const c = s.net >= 0 ? '#2ECC71' : '#E74C3C';
      const t = (s.net >= 0 ? '🟢 Net: +' : '🔴 Net: -') + fmt(s.net);
      netHtml = `<div class="net-label" style="color:${c}">${t}</div>`;
    }

    expandedHtml = `
      <div class="player-expanded">
        <div class="divider"></div>
        <div class="details-row">
          <span class="breakdown">♠ ${breakdown}</span>
          <span class="player-total">${fmt(s.totalAmount)}</span>
          <button class="btn-round" onclick="undoRebuy('${player.id}')" title="Remove last $30 rebuy">&#8722;</button>
          <button class="btn-round" onclick="quickRebuy('${player.id}')" title="Add $30 rebuy">+</button>
        </div>
        ${netHtml}
        <div class="actions-row">
          <button class="btn-outlined green" onclick="showCashOutDialog('${player.id}')">💵 Cash Out</button>
          <button class="btn-outlined red"   onclick="confirmRemove('${player.id}')">✖ Remove</button>
        </div>
      </div>`;
  }

  return `
    <div class="player-card" id="pc-${player.id}">
      <div class="player-header" onclick="toggleExpand('${player.id}')">
        <span class="player-name">🃏 ${esc(player.name)}</span>
        ${badgeHtml}
        <span class="chevron">${expanded ? '▲' : '▼'}</span>
      </div>
      ${expandedHtml}
    </div>`;
}

function toggleExpand(id) {
  if (expandedIds.has(id)) expandedIds.delete(id); else expandedIds.add(id);
  renderPlayers();
}

// ── Session ops ─────────────────────────────────────────────────────
function createSession(name) {
  const s = { id: uid(), name, date: Date.now(), players: [] };
  db.sessions.unshift(s); save(); openSession(s.id);
}

function confirmDeleteSession(id) {
  const s = db.sessions.find(s => s.id === id); if (!s) return;
  if (!confirm(`Delete "${s.name}"? This cannot be undone.`)) return;
  db.sessions = db.sessions.filter(s => s.id !== id); save(); renderSessions();
}

function renameSession(name) {
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (s) { s.name = name; save(); renderSession(); }
}

// ── Player ops ──────────────────────────────────────────────────────
function addPlayer(name, amount) {
  const s = db.sessions.find(s => s.id === currentSessionId); if (!s) return;
  s.players.push({ id: uid(), name, buyins: [{ id: uid(), type: 'BUYIN', amount, timestamp: Date.now() }] });
  save(); renderPlayers();
}

function quickRebuy(pid) {
  const p = findPlayer(pid); if (!p) return;
  p.buyins.push({ id: uid(), type: 'REBUY', amount: 30, timestamp: Date.now() });
  save(); renderPlayers();
}

function undoRebuy(pid) {
  const p = findPlayer(pid); if (!p) return;
  const idx = [...p.buyins].reverse().findIndex(b => b.type === 'REBUY');
  if (idx === -1) return;
  p.buyins.splice(p.buyins.length - 1 - idx, 1); save(); renderPlayers();
}

function cashOut(pid, amount) {
  const p = findPlayer(pid); if (!p) return;
  p.buyins = p.buyins.filter(b => b.type !== 'CASHOUT');
  p.buyins.push({ id: uid(), type: 'CASHOUT', amount, timestamp: Date.now() });
  save(); renderPlayers();
}

function confirmRemove(pid) {
  const p = findPlayer(pid); if (!p) return;
  if (!confirm(`Remove ${p.name} from this session?`)) return;
  const s = db.sessions.find(s => s.id === currentSessionId);
  if (s) { s.players = s.players.filter(pl => pl.id !== pid); expandedIds.delete(pid); save(); renderPlayers(); }
}

function findPlayer(pid) {
  const s = db.sessions.find(s => s.id === currentSessionId);
  return s?.players.find(p => p.id === pid);
}

// ── Dialogs ─────────────────────────────────────────────────────────
function openDialog(html) {
  const dlg = document.getElementById('dialog');
  const ov  = document.getElementById('overlay');
  dlg.innerHTML = html;
  dlg.classList.add('active');
  ov.classList.remove('clear'); ov.classList.add('active');
  setTimeout(() => { const inp = dlg.querySelector('input'); if (inp) { inp.focus(); inp.select && inp.select(); } }, 60);
}

function closeDialog() {
  document.getElementById('dialog').classList.remove('active');
  document.getElementById('overlay').classList.remove('active', 'clear');
}

function handleOverlayClick() {
  if (document.getElementById('session-menu').classList.contains('open')) { closeMenu(); return; }
  closeDialog();
}

function showNewSessionDialog() {
  openDialog(`
    <div class="dialog-title gold-text">♠ New Session</div>
    <input type="text" id="inp-sname" value="${esc(defaultName())}" placeholder="Session name" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitNewSession()">Create ♦</button>
    </div>`);
}

function submitNewSession() {
  const v = document.getElementById('inp-sname')?.value.trim();
  if (v) { closeDialog(); createSession(v); }
}

function showAddPlayerDialog() {
  openDialog(`
    <div class="dialog-title gold-text">🃏 Add Player</div>
    <input type="text" id="inp-pname" placeholder="Player name" autocomplete="off" />
    <input type="number" id="inp-buyin" value="30" placeholder="Buy-in ($)" inputmode="decimal" min="0" step="0.01" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitAddPlayer()">Add ♣</button>
    </div>`);
}

function submitAddPlayer() {
  const name   = document.getElementById('inp-pname')?.value.trim();
  const amount = parseFloat(document.getElementById('inp-buyin')?.value) || 0;
  if (name) { closeDialog(); addPlayer(name, amount); }
}

function showCashOutDialog(pid) {
  const p = findPlayer(pid); if (!p) return;
  const s = stats(p);
  openDialog(`
    <div class="dialog-title gold-text">💵 Cash Out</div>
    <div class="dialog-info">${esc(p.name)} &nbsp;·&nbsp; Total in: ${fmt(s.totalAmount)}</div>
    <input type="number" id="inp-cashout" placeholder="Chips returned ($)" inputmode="decimal" min="0" step="0.01" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitCashOut('${pid}')">Settle ♥</button>
    </div>`);
}

function submitCashOut(pid) {
  const amount = parseFloat(document.getElementById('inp-cashout')?.value) || 0;
  closeDialog(); cashOut(pid, amount);
}

function showRenameDialog() {
  closeMenu();
  const s = db.sessions.find(s => s.id === currentSessionId); if (!s) return;
  openDialog(`
    <div class="dialog-title gold-text">✏️ Rename Session</div>
    <input type="text" id="inp-rename" value="${esc(s.name)}" />
    <div class="dialog-actions">
      <button class="btn-dialog cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-dialog confirm" onclick="submitRename()">Rename ♠</button>
    </div>`);
}

function submitRename() {
  const v = document.getElementById('inp-rename')?.value.trim();
  if (v) { closeDialog(); renameSession(v); }
}

// ── Menu ─────────────────────────────────────────────────────────────
function toggleMenu() {
  const menu = document.getElementById('session-menu');
  const ov   = document.getElementById('overlay');
  if (menu.classList.contains('open')) { closeMenu(); }
  else { menu.classList.add('open'); ov.classList.add('active', 'clear'); }
}
function closeMenu() {
  document.getElementById('session-menu').classList.remove('open');
  document.getElementById('overlay').classList.remove('active', 'clear');
}

// ── Keyboard ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const b = document.querySelector('#dialog .btn-dialog.confirm'); if (b) b.click(); }
  if (e.key === 'Escape') {
    if (document.getElementById('session-menu').classList.contains('open')) { closeMenu(); return; }
    if (document.getElementById('dialog').classList.contains('active')) closeDialog();
  }
});

// ── PWA ──────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ── Boot ─────────────────────────────────────────────────────────────
load();
renderSessions();
</script>
</body>
</html>
